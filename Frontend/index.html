<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e14">
    <meta name="color-scheme" content="dark">
    <title>MarketMind — Trading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/marketmind-icon.svg" type="image/svg+xml">
</head>
<body>
    <a class="skip-link" href="#chart-container">Skip to chart</a>

    <div class="app">
        <header class="topbar">
            <div class="topbar__left">
                <div class="topbar__brand">
                    <img class="topbar__mark" src="assets/marketmind-icon.svg" width="34" height="34" alt="" decoding="async">
                    <div class="topbar__brand-text">
                        <span class="topbar__title">MarketMind</span>
                        <span class="topbar__tag">Pro</span>
                    </div>
                </div>
                <div class="topbar__divider" aria-hidden="true"></div>
                <div class="topbar__symbol" id="active-symbol">
                    <span class="topbar__symbol-name" id="symbol-name">RELIANCE</span>
                    <span class="topbar__symbol-meta" id="symbol-meta">NSE · Equity · INR</span>
                </div>
            </div>

            <div class="topbar__quote">
                <div class="topbar__price-block">
                    <span class="topbar__last" id="header-last">₹2,847.35</span>
                    <span class="topbar__change up" id="header-change">+42.10 (+1.50%)</span>
                </div>
                <dl class="topbar__ohlc" id="header-ohlc" aria-label="Latest bar">
                    <div class="ohlc-pill"><dt>O</dt><dd id="stat-o">—</dd></div>
                    <div class="ohlc-pill"><dt>H</dt><dd id="stat-h">—</dd></div>
                    <div class="ohlc-pill"><dt>L</dt><dd id="stat-l">—</dd></div>
                    <div class="ohlc-pill"><dt>C</dt><dd id="stat-c">—</dd></div>
                </dl>
            </div>

            <div class="topbar__spacer"></div>

            <div class="topbar__actions">
                <button type="button" class="icon-btn" id="btn-theme" title="Toggle theme" aria-label="Toggle light or dark theme">
                    <span class="icon-btn__glyph theme-sun" aria-hidden="true"></span>
                </button>
                <button type="button" class="btn btn--ghost btn--sm" id="btn-layout">Layout</button>
                <button type="button" class="btn btn--ghost btn--sm">Alerts</button>
            </div>
        </header>

        <div class="workspace">
            <aside class="panel panel--watchlist" aria-label="Watchlist">
                <div class="panel__head">
                    <label class="visually-hidden" for="watchlist-search">Search symbols</label>
                    <div class="search-wrap">
                        <span class="search-wrap__icon" aria-hidden="true"></span>
                        <input type="search" class="input input--search" id="watchlist-search" placeholder="Search symbols" autocomplete="off" spellcheck="false">
                    </div>
                </div>
                <div class="watchlist-tabs" role="tablist" aria-label="List type">
                    <button type="button" class="tab tab--active" role="tab" aria-selected="true" data-tab="watch">Watchlist</button>
                    <button type="button" class="tab" role="tab" aria-selected="false" data-tab="hot">Movers</button>
                </div>
                <ul class="watchlist" id="watchlist"></ul>
            </aside>

            <main class="chart-workspace">
                <div class="chart-toolbar">
                    <div class="tf-group" id="timeframes" role="tablist" aria-label="Timeframe">
                        <button type="button" class="tf tf--active" role="tab" aria-selected="true" data-tf="1D">1D</button>
                        <button type="button" class="tf" role="tab" aria-selected="false" data-tf="1W">1W</button>
                        <button type="button" class="tf" role="tab" aria-selected="false" data-tf="1M">1M</button>
                        <button type="button" class="tf" role="tab" aria-selected="false" data-tf="3M">3M</button>
                        <button type="button" class="tf" role="tab" aria-selected="false" data-tf="1Y">1Y</button>
                    </div>
                    <div class="chart-toolbar__right">
                        <span class="badge badge--dim" id="chart-hint">Candles · demo</span>
                        <button type="button" class="btn btn--icon" id="btn-fullscreen" title="Expand chart" aria-label="Expand chart">⛶</button>
                    </div>
                </div>
                <div class="chart-frame">
                    <div class="chart-shell">
                        <div id="chart-container" class="chart-container" tabindex="-1"></div>
                    </div>
                </div>
                <div class="ticker-wrap">
                    <div class="ticker" id="ticker" aria-hidden="true"></div>
                </div>
            </main>

            <aside class="panel panel--order" aria-label="Order ticket">
                <div class="order-tabs" role="tablist">
                    <button type="button" class="order-tab order-tab--active" data-side="buy" role="tab" aria-selected="true">Buy</button>
                    <button type="button" class="order-tab order-tab--sell" data-side="sell" role="tab" aria-selected="false">Sell</button>
                </div>
                <div class="order-body">
                    <div class="field">
                        <label class="label" for="order-type">Order type</label>
                        <select id="order-type" class="select">
                            <option value="market">Market</option>
                            <option value="limit">Limit</option>
                            <option value="sl">Stop loss</option>
                        </select>
                    </div>
                    <div class="field field--row">
                        <div>
                            <label class="label" for="qty">Quantity</label>
                            <input type="number" id="qty" class="input" value="10" min="1" step="1">
                        </div>
                        <div>
                            <label class="label" for="price-input">Price</label>
                            <input type="number" id="price-input" class="input" step="0.05" placeholder="MKT">
                        </div>
                    </div>
                    <div class="est-card">
                        <span class="est-card__label">Estimated value</span>
                        <span class="est-card__value mono" id="est-value">₹—</span>
                    </div>
                    <button type="button" class="btn btn--primary btn--block btn--lg" id="btn-submit-order">Place buy order</button>

                    <section class="depth" aria-label="Order book preview">
                        <div class="depth__head">
                            <h3 class="depth__title">Order book</h3>
                            <span class="badge badge--sm">Demo</span>
                        </div>
                        <div class="depth__cols">
                            <div class="depth__side depth__side--bid">
                                <span>Bid</span>
                                <span>Size</span>
                            </div>
                            <div class="depth__side depth__side--ask">
                                <span>Ask</span>
                                <span>Size</span>
                            </div>
                        </div>
                        <div class="depth__rows" id="depth-rows"></div>
                    </section>

                    <section class="predict-card" aria-label="AI signal">
                        <div class="predict-card__head">
                            <span class="predict-card__icon" aria-hidden="true"></span>
                            <h3 class="predict-card__title">Model signal</h3>
                        </div>
                        <p class="predict-card__hint">Simulated output for UI preview.</p>
                        <button type="button" class="btn btn--secondary btn--block" id="btn-predict">Run prediction</button>
                        <p class="predict-result" id="predict-result"></p>
                    </section>
                </div>
            </aside>
        </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="script.js"></script>
</body>
</html>
